<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Jergan Studio 3D</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
body{margin:0;font-family:Arial;background:#1b1b1b;color:white;overflow:hidden;}
#topbar{background:#222;padding:8px;display:flex;gap:5px;}
#main{display:flex;height:calc(100vh - 40px);}
#hierarchy{width:220px;background:#2a2a2a;padding:10px;overflow:auto;}
#inspector{width:260px;background:#2a2a2a;padding:10px;}
#viewport{flex:1;position:relative;}
#game{width:100%;height:100%;}
button{margin:2px;}
textarea{width:100%;height:150px;background:black;color:#0f0;}
.folder{margin-bottom:10px;}
</style>
</head>
<body>

<div id="topbar">
<button onclick="setTool('move')">Move</button>
<button onclick="setTool('rotate')">Rotate</button>
<button onclick="setTool('scale')">Scale</button>

<button onclick="insertCube()">Insert Cube</button>
<button onclick="insertUIText()">Insert UI</button>
<button onclick="insertScript()">Insert Script</button>
<button onclick="insertDocument()">Insert Document</button>

<button onclick="toggleFPS()">First Person</button>
<button onclick="exportGame()">Download Game</button>
</div>

<div id="main">

<div id="hierarchy">
<div class="folder"><b>Environment</b><div id="envFolder"></div></div>
<div class="folder"><b>Scripts</b><div id="scriptFolder"></div></div>
<div class="folder"><b>UI</b><div id="uiFolder"></div></div>
<div class="folder"><b>Documents</b><div id="docFolder"></div></div>
</div>

<div id="viewport">
<canvas id="game"></canvas>
</div>

<div id="inspector"></div>

</div>

<script>
let scene,camera,renderer;
let objects={},folders={Environment:{},Scripts:{},UI:{},Documents:{}};
let selected=null;
let tool="move";
let keys={},isFPS=false,mouseDown=false;

init(); animate();

function init(){
scene=new THREE.Scene();
scene.background=new THREE.Color("skyblue");

camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
camera.position.set(0,2,5);

renderer=new THREE.WebGLRenderer({canvas:game});
renderer.setSize(window.innerWidth-480,window.innerHeight-40);

let light=new THREE.DirectionalLight(0xffffff,1);
light.position.set(5,10,7);
scene.add(light);
scene.add(new THREE.GridHelper(50,50));

window.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
window.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

window.addEventListener("mousedown",e=>{if(e.button===2)mouseDown=true;});
window.addEventListener("mouseup",e=>{if(e.button===2)mouseDown=false;});
window.addEventListener("mousemove",e=>{
if(mouseDown){camera.rotation.y-=e.movementX*0.002;camera.rotation.x-=e.movementY*0.002;}
});
window.addEventListener("contextmenu",e=>e.preventDefault());
}

function animate(){
requestAnimationFrame(animate);

if(isFPS){
if(keys["w"])camera.translateZ(-0.1);
if(keys["s"])camera.translateZ(0.1);
if(keys["a"])camera.translateX(-0.1);
if(keys["d"])camera.translateX(0.1);
}

for(let n in folders.Environment){
folders.Environment[n].scripts.forEach(s=>s.run(folders.Environment[n].mesh));
}

renderer.render(scene,camera);
}

function toggleFPS(){isFPS=!isFPS;}
function setTool(t){tool=t;}

function insertCube(){
let geo=new THREE.BoxGeometry(1,1,1);
let mat=new THREE.MeshStandardMaterial({color:0x00ff00});
let mesh=new THREE.Mesh(geo,mat);
mesh.position.y=1;
scene.add(mesh);

let id="Part_"+Object.keys(objects).length;
objects[id]={mesh:mesh,scripts:[]};
folders.Environment[id]=objects[id];
updateHierarchy();
}

function insertUIText(){
let div=document.createElement("div");
div.innerText="UI Text";
div.style.position="absolute";
div.style.top="50px";
div.style.left="50px";
div.style.color="white";
viewport.appendChild(div);

folders.UI["UI_"+Object.keys(folders.UI).length]=div;
updateHierarchy();
}

function insertScript(){
folders.Scripts["Script_"+Object.keys(folders.Scripts).length]="New Script";
updateHierarchy();
}

function insertDocument(){
folders.Documents["Doc_"+Object.keys(folders.Documents).length]="Document";
updateHierarchy();
}

function updateHierarchy(){
envFolder.innerHTML="";
for(let n in folders.Environment){
let d=document.createElement("div");
d.innerText=n;
d.onclick=()=>select(n);
envFolder.appendChild(d);
}
}

function select(name){
selected=folders.Environment[name];
showInspector(name);
}

function showInspector(name){
if(!selected)return;
inspector.innerHTML=`
<h3>${name}</h3>
X:<input id="px" value="${selected.mesh.position.x}"><br>
Y:<input id="py" value="${selected.mesh.position.y}"><br>
Z:<input id="pz" value="${selected.mesh.position.z}"><br>
<button onclick="applyTransform('${name}')">Apply</button>
<br><br>
<textarea id="scriptArea">
script Example {

    number speed = 0.02

    update {
        self.rotateY(speed)
    }

}
</textarea>
<button onclick="attachScript('${name}')">Attach Script</button>
`;
}

function applyTransform(name){
selected.mesh.position.set(parseFloat(px.value),parseFloat(py.value),parseFloat(pz.value));
}

function attachScript(name){
let code=document.getElementById("scriptArea").value;
let compiled=compileJVE(code);
compiled.original=code;
folders.Environment[name].scripts.push(compiled);
}

function compileJVE(code){
let vars={};
let varRegex=/number\s+(\w+)\s*=\s*([\d.-]+)/g;
let match;
while((match=varRegex.exec(code))!==null){
vars[match[1]]=parseFloat(match[2]);
}

let start="",update="";
let sm=code.match(/start\s*{([\s\S]*?)}/);
if(sm)start=sm[1];
let um=code.match(/update\s*{([\s\S]*?)}/);
if(um)update=um[1];

update=update.replace(/self\.x/g,"mesh.position.x");
update=update.replace(/self\.y/g,"mesh.position.y");
update=update.replace(/self\.z/g,"mesh.position.z");
update=update.replace(/self\.rotateY\((.*?)\)/g,"mesh.rotation.y+=$1");
update=update.replace(/self\.touching\("(.*?)"\)/g,'checkCollision(mesh,folders.Environment["$1"].mesh)');

for(let v in vars){update=update.replaceAll(v,vars[v]);}

let startFunc=new Function("mesh",start);
let updateFunc=new Function("mesh",update);

return{
started:false,
run(mesh){
if(!this.started){startFunc(mesh);this.started=true;}
updateFunc(mesh);
}
};
}

function checkCollision(a,b){
let box1=new THREE.Box3().setFromObject(a);
let box2=new THREE.Box3().setFromObject(b);
return box1.intersectsBox(box2);
}

function exportGame(){
let html=`<!DOCTYPE html><html><head>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"><\/script>
</head><body style="margin:0">
<canvas id="c"></canvas>
<script>
let scene=new THREE.Scene();
scene.background=new THREE.Color("skyblue");
let camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
camera.position.set(0,2,5);
let renderer=new THREE.WebGLRenderer({canvas:document.getElementById("c")});
renderer.setSize(innerWidth,innerHeight);
let light=new THREE.DirectionalLight(0xffffff,1);
light.position.set(5,10,7);
scene.add(light);
let objects={};
`;

for(let n in folders.Environment){
let o=folders.Environment[n];
html+=`
{
let geo=new THREE.BoxGeometry(1,1,1);
let mat=new THREE.MeshStandardMaterial({color:0x00ff00});
let mesh=new THREE.Mesh(geo,mat);
mesh.position.set(${o.mesh.position.x},${o.mesh.position.y},${o.mesh.position.z});
scene.add(mesh);
objects["${n}"]={mesh:mesh};
}
`;
}

html+=`
function animate(){requestAnimationFrame(animate);renderer.render(scene,camera);}
animate();
<\/script></body></html>`;

let blob=new Blob([html],{type:"text/html"});
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="JerganGame.html";
a.click();
}
</script>

</body>
</html>
