<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Jergan Studio 3D</title>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/controls/TransformControls.js"></script>

<style>
body { margin:0; overflow:hidden; background:#111; font-family:Arial; color:white; }

#toolbar {
    position:fixed;
    top:10px;
    left:10px;
    background:#222;
    padding:10px;
    border-radius:10px;
    display:flex;
    gap:5px;
    z-index:10;
}

button {
    background:#333;
    color:white;
    border:none;
    padding:8px;
    border-radius:5px;
    cursor:pointer;
}

button:hover { background:#555; }

#learnBox {
    position:fixed;
    right:10px;
    top:10px;
    background:#222;
    padding:15px;
    border-radius:10px;
    display:none;
    width:250px;
}
</style>
</head>
<body>

<div id="toolbar">
    <button onclick="addCube()">Insert Cube</button>
    <button onclick="setTool('translate')">Move</button>
    <button onclick="setTool('scale')">Scale</button>
    <button onclick="setTool('rotate')">Rotate</button>
    <button onclick="downloadProject()">Download</button>
    <button onclick="toggleLearn()">Learn</button>
</div>

<div id="learnBox">
<h3>How To Use</h3>
<p>• Click Insert Cube to add object</p>
<p>• Click object to select</p>
<p>• Use Move / Scale / Rotate tools</p>
<p>• Download exports a playable scene</p>
</div>

<script>

let scene, camera, renderer, orbit, transform;
let objects = [];

init();
animate();

function init(){

    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111111);

    camera = new THREE.PerspectiveCamera(
        75,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
    );
    camera.position.set(5,5,5);

    renderer = new THREE.WebGLRenderer({antialias:true});
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    orbit = new THREE.OrbitControls(camera, renderer.domElement);

    transform = new THREE.TransformControls(camera, renderer.domElement);
    scene.add(transform);

    transform.addEventListener("dragging-changed", function(e){
        orbit.enabled = !e.value;
    });

    let light = new THREE.DirectionalLight(0xffffff,1);
    light.position.set(5,10,7);
    scene.add(light);

    let grid = new THREE.GridHelper(50,50);
    scene.add(grid);

    window.addEventListener("resize", onResize);
    window.addEventListener("pointerdown", selectObject);
}

function animate(){
    requestAnimationFrame(animate);
    renderer.render(scene,camera);
}

function onResize(){
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

function addCube(){
    let geo = new THREE.BoxGeometry();
    let mat = new THREE.MeshStandardMaterial({color:0x00ffcc});
    let cube = new THREE.Mesh(geo,mat);
    cube.position.y = 0.5;
    scene.add(cube);
    objects.push(cube);
}

function selectObject(event){

    let mouse = new THREE.Vector2(
        (event.clientX / window.innerWidth) * 2 - 1,
        -(event.clientY / window.innerHeight) * 2 + 1
    );

    let raycaster = new THREE.Raycaster();
    raycaster.setFromCamera(mouse, camera);

    let intersects = raycaster.intersectObjects(objects);

    if(intersects.length > 0){
        transform.attach(intersects[0].object);
    }
}

function setTool(mode){
    transform.setMode(mode);
}

function toggleLearn(){
    let box = document.getElementById("learnBox");
    box.style.display = box.style.display === "none" ? "block" : "none";
}

function downloadProject(){

    let data = objects.map(o=>({
        x:o.position.x,
        y:o.position.y,
        z:o.position.z,
        sx:o.scale.x,
        sy:o.scale.y,
        sz:o.scale.z,
        rx:o.rotation.x,
        ry:o.rotation.y,
        rz:o.rotation.z
    }));

    let exportHTML =
'<!DOCTYPE html>'+
'<html><head>'+
'<meta charset="UTF-8">'+
'<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"><\/script>'+
'</head><body style="margin:0">'+
'<script>'+
'let scene=new THREE.Scene();'+
'let camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);'+
'camera.position.set(5,5,5);'+
'let renderer=new THREE.WebGLRenderer({antialias:true});'+
'renderer.setSize(window.innerWidth,window.innerHeight);'+
'document.body.appendChild(renderer.domElement);'+
'let light=new THREE.DirectionalLight(0xffffff,1);'+
'light.position.set(5,10,7);'+
'scene.add(light);'+
'let grid=new THREE.GridHelper(50,50);scene.add(grid);'+
'let objects='+JSON.stringify(data)+';'+
'objects.forEach(o=>{'+
'let cube=new THREE.Mesh(new THREE.BoxGeometry(),new THREE.MeshStandardMaterial({color:0x00ffcc}));'+
'cube.position.set(o.x,o.y,o.z);'+
'cube.scale.set(o.sx,o.sy,o.sz);'+
'cube.rotation.set(o.rx,o.ry,o.rz);'+
'scene.add(cube);'+
'});'+
'function animate(){requestAnimationFrame(animate);renderer.render(scene,camera);}animate();'+
'<\/script></body></html>';

    let blob = new Blob([exportHTML], {type:"text/html"});
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "jergan_scene.html";
    a.click();
}

</script>
</body>
</html>
